<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowchart Editor - Visual Programming Environment</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Lucide Icons via CDN (for beautiful UI icons) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Styling -->
  <link rel="stylesheet" href="index.css">
</head>
<body class="dark-theme">
  <!-- Main Grid App Layout -->
  <div class="app-container">
    
    <!-- Top Header Bar -->
    <header class="app-header">
      <div class="brand">
        <i data-lucide="git-branch" class="brand-icon"></i>
        <h1>Flowchart Studio</h1>
      </div>
      
      <!-- Procedure Navigation Tabs -->
      <nav class="procedure-tabs-container">
        <div class="procedure-tabs" id="procedure-tabs">
          <!-- Populated via JS -->
        </div>
        <button id="add-proc-btn" class="btn btn-secondary btn-icon-only" title="Create New Procedure">
          <i data-lucide="plus"></i>
        </button>
      </nav>

      <!-- Action Buttons -->
      <div class="header-actions">
        <button id="add-note-btn" class="btn btn-secondary">
          <i data-lucide="sticky-note"></i> Add Note
        </button>
        
        <!-- File Dropdown -->
        <div class="dropdown">
          <button id="file-dropdown-btn" class="btn btn-secondary dropdown-toggle" title="File operations">
            <i data-lucide="folder-open"></i> File <i data-lucide="chevron-down" class="chevron-icon"></i>
          </button>
          <div class="dropdown-menu" id="file-dropdown-menu">
            <button id="import-btn" class="dropdown-item">
              <i data-lucide="upload"></i> Import JSON
            </button>
            <button id="export-btn" class="dropdown-item">
              <i data-lucide="download"></i> Export JSON
            </button>
            <div class="dropdown-divider"></div>
            <button id="export-pdf-btn" class="dropdown-item">
              <i data-lucide="file-text"></i> Export PDF
            </button>
            <button id="export-svg-btn" class="dropdown-item">
              <i data-lucide="image"></i> Export SVG
            </button>
          </div>
        </div>

        <button id="clear-btn" class="btn btn-danger">
          <i data-lucide="trash-2"></i> Clear
        </button>
        <!-- Hidden input for file upload -->
        <input type="file" id="file-input" accept=".json" style="display: none;">
      </div>
    </header>

    <div class="main-layout">
      <!-- Sidebar Inspector Panel -->
      <aside class="sidebar" id="inspector-panel">
        <div class="sidebar-header">
          <i data-lucide="sliders" class="header-icon"></i>
          <h2>Properties</h2>
        </div>
        
        <!-- Inspector Form Content -->
        <div class="inspector-content" id="inspector-content">
          <div class="empty-state">
            <i data-lucide="mouse-pointer" class="empty-icon"></i>
            <p>Select a block in the flowchart to inspect and edit its properties.</p>
          </div>
        </div>

        <!-- Block Information / Legend -->
        <div class="sidebar-footer">
          <div class="guide-grid">
            <div class="guide-item"><span class="badge start-badge"></span> Start/End</div>
            <div class="guide-item"><span class="badge io-badge"></span> Input/Output</div>
            <div class="guide-item"><span class="badge assign-badge"></span> Assignment</div>
            <div class="guide-item"><span class="badge cond-badge"></span> Conditionals</div>
            <div class="guide-item"><span class="badge call-badge"></span> Call Block</div>
          </div>
        </div>
      </aside>

      <!-- Main Canvas Container -->
      <main class="canvas-container">
        <!-- Floating Canvas Controls -->
        <div class="canvas-controls">
          <button id="zoom-in-btn" class="control-btn" title="Zoom In">
            <i data-lucide="zoom-in"></i>
          </button>
          <button id="zoom-out-btn" class="control-btn" title="Zoom Out">
            <i data-lucide="zoom-out"></i>
          </button>
          <button id="zoom-fit-btn" class="control-btn" title="Fit to Screen">
            <i data-lucide="maximize"></i>
          </button>
          <div class="zoom-divider"></div>
          <span id="zoom-indicator" class="zoom-level">100%</span>
        </div>

        <!-- SVG Viewport -->
        <svg id="flowchart-svg" class="flowchart-svg" xmlns="http://www.w3.org/2000/svg">
          <!-- Grid definitions and filters -->
          <defs>
            <!-- Background Grid -->
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
              <circle cx="0" cy="0" r="1.5" fill="rgba(255, 255, 255, 0.15)" />
            </pattern>
            <!-- Drop Shadow Filter for Blocks -->
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4" />
            </filter>
            <!-- Start/End Pill Gradient -->
            <linearGradient id="grad-start" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#10b981" />
              <stop offset="100%" stop-color="#047857" />
            </linearGradient>
            <linearGradient id="grad-end" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f43f5e" />
              <stop offset="100%" stop-color="#be123c" />
            </linearGradient>
            <!-- Input/Output Gradient -->
            <linearGradient id="grad-io" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0ea5e9" />
              <stop offset="100%" stop-color="#0369a1" />
            </linearGradient>
            <!-- Assignment Gradient -->
            <linearGradient id="grad-assign" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6" />
              <stop offset="100%" stop-color="#5b21b6" />
            </linearGradient>
            <!-- Conditional/Loop Gradient -->
            <linearGradient id="grad-cond" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f59e0b" />
              <stop offset="100%" stop-color="#b45309" />
            </linearGradient>
            <!-- Call Block Gradient -->
            <linearGradient id="grad-call" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ec4899" />
              <stop offset="100%" stop-color="#be185d" />
            </linearGradient>
          </defs>

          <!-- Infinite Grid Background -->
          <rect width="100%" height="100%" fill="url(#grid)" pointer-events="none" />
          
          <!-- Flowchart Elements Group (this will contain the actual tree drawing) -->
          <g id="flowchart-content">
            <!-- Rendered by layout.js -->
          </g>
        </svg>
      </main>
    </div>

    <!-- Context Dropdown Menu (for block insertion) -->
    <div id="context-menu" class="context-menu" style="display: none;">
      <div class="menu-header">Insert Block</div>
      <button class="menu-item" data-type="assignment">
        <i data-lucide="edit-3" class="menu-icon assign-icon"></i>
        <span>Assignment</span>
      </button>
      <button class="menu-item" data-type="call">
        <i data-lucide="phone-call" class="menu-icon call-icon"></i>
        <span>Call</span>
      </button>
      <button class="menu-item" data-type="input">
        <i data-lucide="log-in" class="menu-icon io-icon"></i>
        <span>Input</span>
      </button>
      <button class="menu-item" data-type="output">
        <i data-lucide="log-out" class="menu-icon io-icon"></i>
        <span>Output</span>
      </button>
      <div class="menu-divider"></div>
      <button class="menu-item" data-type="if">
        <i data-lucide="git-commit" class="menu-icon cond-icon"></i>
        <span>If-Else Branch</span>
      </button>
      <button class="menu-item" data-type="while">
        <i data-lucide="rotate-cw" class="menu-icon cond-icon"></i>
        <span>While Loop</span>
      </button>
      <button class="menu-item" data-type="do-while">
        <i data-lucide="refresh-cw" class="menu-icon cond-icon"></i>
        <span>Do-While Loop</span>
      </button>
    </div>

    <!-- New Procedure Modal -->
    <div id="modal-container" class="modal-overlay" style="display: none;">
      <div class="modal">
        <div class="modal-header">
          <h2>Create New Procedure</h2>
          <button id="modal-close-btn" class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <form id="new-procedure-form" class="modal-body">
          <div class="form-group">
            <label for="procedure-name-input">Procedure Name</label>
            <input type="text" id="procedure-name-input" placeholder="e.g., calculateTotal" required pattern="^[a-zA-Z][a-zA-Z0-9_]*$" title="Must be a valid identifier starting with a letter">
            <small class="form-help">Must start with a letter, and contain only letters, numbers, and underscores.</small>
          </div>
          <div class="modal-actions">
            <button type="button" id="modal-cancel-btn" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn btn-primary">Create Procedure</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <!-- Javascript Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
